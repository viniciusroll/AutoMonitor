[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers

[coverage:run]
source = app
branch = False
omit =
    # Bordas de I/O testadas via integração manual (Playwright/SMTP/HTTP/CLI):
    app/providers/browser.py
    app/providers/base.py
    app/notifications/telegram.py
    app/notifications/email.py
    app/notifications/discord.py
    app/cli/*
    app/config.py
    app/utils/logger.py
    main.py

[coverage:report]
show_missing = True
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    \.\.\.
